<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peaceful Tasks</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">Peaceful Tasks</h1>
            <p class="subtitle">One thing at a time, done with care ✨</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                class="task-input" 
                placeholder="What needs your attention today?"
                autocomplete="off"
            >
            <button id="addBtn" class="add-btn" aria-label="Add task">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <div class="stats" id="stats">
            <span class="stat-item">
                <span class="stat-number" id="activeCount">0</span>
                <span class="stat-label">active</span>
            </span>
            <span class="stat-divider">•</span>
            <span class="stat-item">
                <span class="stat-number" id="completedCount">0</span>
                <span class="stat-label">completed</span>
            </span>
        </div>

        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📝</div>
                <p class="empty-text">Your task list is beautifully empty</p>
                <p class="empty-hint">Add a task above to get started</p>
            </div>
            <ul class="tasks-list" id="tasksList"></ul>
        </div>

        <div class="encouragement" id="encouragement"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
